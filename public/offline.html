<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Koneksi Terputus - Zeas Creative Corner</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #FFF8F2; /* Cream background */
        color: #1e293b;
        font-family: 'Inter', -apple-system, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        text-align: center;
        box-sizing: border-box;
        padding: 24px;
      }
      .container {
        max-width: 480px;
        background: rgba(255, 255, 255, 0.6);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(212, 175, 55, 0.25);
        padding: 40px 32px;
        box-shadow: 0 10px 30px rgba(194, 24, 91, 0.05);
        position: relative;
      }
      .logo-outer {
        position: relative;
        width: 100px;
        height: 100px;
        margin: 0 auto 30px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        border: 1px solid rgba(212, 175, 55, 0.3);
      }
      .logo-inner {
        width: 72px;
        height: 72px;
        border-radius: 50%;
        background: linear-gradient(135deg, #FFFDF9, #FAF3E6);
        border: 1px solid rgba(212, 175, 55, 0.45);
        box-shadow: 0 4px 15px rgba(212, 175, 55, 0.15);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .logo-text {
        font-family: 'Playfair Display', serif;
        font-size: 36px;
        font-weight: 900;
        color: #C2185B; /* Fuchsia brand color */
      }
      h1 {
        font-family: 'Playfair Display', serif;
        font-size: 24px;
        font-weight: 700;
        color: #0f172a;
        margin: 0 0 12px;
        letter-spacing: 0.02em;
      }
      p {
        font-size: 14px;
        line-height: 1.6;
        color: #64748b;
        margin: 0 0 30px;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background-color: #C2185B;
        color: #FFF8F2;
        text-decoration: none;
        padding: 12px 32px;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        border: 1px solid #C2185B;
        cursor: pointer;
        transition: all 0.3s ease;
      }
      .btn:hover {
        background-color: #FFF8F2;
        color: #C2185B;
        border-color: #C2185B;
        box-shadow: 0 4px 15px rgba(194, 24, 91, 0.15);
      }
      .offline-badge {
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.25em;
        color: #C2185B;
        text-transform: uppercase;
        margin-bottom: 8px;
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo-outer">
        <div class="logo-inner">
          <span class="logo-text">Z</span>
        </div>
      </div>
      
      <span class="offline-badge">Koneksi Terputus</span>
      <h1>Mode Offline Aktif</h1>
      <p>
        Sepertinya perangkat Anda sedang tidak terhubung ke internet. Silakan periksa koneksi Anda dan coba segarkan halaman ini.
      </p>
      
      <button class="btn" onclick="window.location.reload();">
        Coba Lagi
      </button>
    </div>
  </body>
</html>
